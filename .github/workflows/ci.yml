name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Lint
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Compute ANTLR submodule hash
        id: antlr-hash
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:antlr4)" >> "$GITHUB_OUTPUT"

      - name: Cache ANTLR toolchain
        uses: actions/cache@v5
        with:
          path: antlr4/tool/target
          key: ${{ runner.os }}-antlr-tool-${{ steps.antlr-hash.outputs.sha }}

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --no-deps -- -D warnings

  # Build and test
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-${{ matrix.rust }}
          cache-on-failure: true

      - name: Compute ANTLR submodule hash
        id: antlr-hash
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:antlr4)" >> "$GITHUB_OUTPUT"

      - name: Cache ANTLR toolchain
        uses: actions/cache@v5
        with:
          path: |
            antlr4/runtime/Java/target
            antlr4/tool/target
          key: ${{ runner.os }}-antlr-tool-${{ steps.antlr-hash.outputs.sha }}
      
      - name: Build
        run: cargo build --release
      
      - name: Run tests
        run: cargo test --release

  # Checks if dependencies have vulnerabilties
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run security audit
        run: cargo audit
